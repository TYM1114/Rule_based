simulation:
  mode: "db"                  # mode switch: "db" or "random"
  target_run_id: "20260203174258"

# Yard Config
yard:
  max_row: 6
  max_bay: 11
  max_level: 8
  workstation_count: 2
  port_count: 3

# Random Mode Specific
random:
  total_boxes: 200            # random boxes
  mission_count: 30           # random mission

# time config
time:
  t_travel: 5.0
  t_handle: 30.0
  t_port_handle: 10.0         # t_process 
  t_unit_process: 2.0         # t_pick
  sim_start_epoch: 1705363200 # [RB-SPECIFIC] 

# Solver Config
solver:
  agv_count: 3                # AGV 
  w_penalty_lookahead: 1.0    # [RB-SPECIFIC]

# 存log的路徑 (Logging path)
logging:
  output_dir: "logs"
